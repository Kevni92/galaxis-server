name: Bootstrap alpha server issues

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bootstrap-alpha-server-issues.yml

permissions:
  contents: write
  issues: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const specs = [];
            function add(alpha, title, featureId, labels, dependencies, scope, acceptance, tests) {
              specs.push({
                title: `[${alpha}][SERVER] ${title}`,
                milestone: { A0: 1, A1: 2, A2: 3, A3: 4 }[alpha],
                labels: ['alpha', 'server', 'codex-ready', ...labels],
                body: `**Feature-ID:** \`${featureId}\`\n\n## Ziel\n${scope.goal}\n\n## Fachliche Quellen\n${scope.docs.map(x => `- \`${x}\``).join('\n')}\n\n## Umfang\n${scope.items.map(x => `- ${x}`).join('\n')}\n\n## Nicht enthalten\n${scope.out.map(x => `- ${x}`).join('\n')}\n\n## Abhängigkeiten\n${dependencies.length ? dependencies.map(x => `- ${x}`).join('\n') : '- keine; Einstiegspunkt der Alpha'}\n\n## Akzeptanzkriterien\n${acceptance.map(x => `- [ ] ${x}`).join('\n')}\n\n## Tests und Nachweis\n${tests.map(x => `- ${x}`).join('\n')}\n\n## Roadmap\n- Docs-Umbrella: \`Kevni92/galaxis-docs#${{A0:115,A1:116,A2:117,A3:118}[alpha]}\`\n- Gesamtroadmap: \`galaxis-docs/roadmap/IMPLEMENTATION-ROADMAP.md\``
              });
            }

            add('A0', 'Technologiestack und Architekturgrenzen verbindlich umsetzen', 'GAL-PLATFORM-STACK-001', ['infrastructure'], [], {
              goal: 'Die für A0 beschlossene technische Basis festhalten und ein minimales Architekturdiagramm sowie Modulabhängigkeiten für die Implementierung vorbereiten.',
              docs: ['docs/decisions/0005-a0-server-technologiestack.md', 'docs/WORKFLOW.md', 'docs/SOURCE-CODE.md'],
              items: ['C++20, CMake Presets und vcpkg-Manifest als Buildbasis', 'Boost.Asio/Beast als HTTP-Adapter, nlohmann/json, spdlog, PostgreSQL/libpqxx, libsodium und Catch2', 'strikte Trennung von Domain, Application, Infrastructure und REST-Adapter', 'Abhängigkeitsrichtung dokumentieren und zyklische Modulabhängigkeiten verhindern'],
              out: ['Gameplay-Domänen', 'Produktionsdeployment', 'Clientcode']
            }, ['Entscheidung ist im Repository-README und den Modul-READMEs nachvollziehbar.', 'Domaincode hängt nicht von HTTP, PostgreSQL oder JSON ab.', 'Buildzielstruktur für Server, Tests und Hilfswerkzeuge ist festgelegt.', 'Keine alternative Bibliothek wird ohne neue dokumentierte Entscheidung eingeführt.'], ['reine Strukturprüfung und CMake-Konfiguration', 'Docs-Links und Modulnavigation prüfen']);

            add('A0', 'Repository-Basis und Docs-Submodule einrichten', 'GAL-PLATFORM-REPO-001', ['infrastructure'], ['GAL-PLATFORM-STACK-001'], {
              goal: 'Das leere Repository nach einem frischen Clone reproduzierbar baubar machen und die fachliche Dokumentation als Submodule einbinden.',
              docs: ['docs/AGENTS.md', 'docs/WORKFLOW.md', 'docs/TESTING.md'],
              items: ['git-Submodule `docs/` auf einen konkreten freigegebenen Commit', 'CMakeLists, CMakePresets, vcpkg.json und Verzeichnisstruktur', 'README mit Windows-, Linux- und Docker-Startbefehlen', 'Module `app`, `domain`, `application`, `infrastructure`, `transport` und `tests` mit lokalen README-Dateien', 'Formatierungs- und Editorgrundlagen'],
              out: ['HTTP-Funktionalität', 'Datenbanktabellen', 'Authentifizierung']
            }, ['Clone inklusive Submodule lässt sich mit dokumentierten Befehlen konfigurieren.', 'Ein minimales Server-Binary und ein Test-Binary werden gebaut.', 'Keine Fachlogik liegt in `main` oder Transportklassen.', 'Submodule-Commit ist sichtbar und reproduzierbar.'], ['lokaler Configure- und Build-Smoke-Test', 'ein trivialer Catch2-Test', 'CI-kompatibler Build ohne globale Entwicklerabhängigkeiten']);

            add('A0', 'Konfiguration, strukturiertes Logging und Health-Endpunkte bereitstellen', 'GAL-PLATFORM-RUNTIME-001', ['infrastructure', 'api'], ['GAL-PLATFORM-REPO-001'], {
              goal: 'Der Server startet konfigurierbar, protokolliert strukturiert und liefert getrennte Liveness- und Readiness-Signale.',
              docs: ['docs/contracts/rest-api/galaxis-rest-v1.md', 'docs/roadmap/IMPLEMENTATION-ROADMAP.md'],
              items: ['Umgebungsvariablen mit validiertem Konfigurationsobjekt', 'keine Secrets in Logs', 'Request-Korrelation und strukturierte Logfelder', '`GET /health/live` und `GET /health/ready`', 'geordnetes Starten und Herunterfahren'],
              out: ['Account- oder Kampagnenzustand', 'Monitoring-Infrastruktur außerhalb des Prozesses']
            }, ['Fehlende Pflichtkonfiguration beendet den Start mit verständlicher Meldung.', 'Liveness benötigt keine Datenbank; Readiness prüft notwendige Infrastruktur.', 'Shutdown beendet Listener und Ressourcen ohne Hängen.', 'Logausgabe enthält Zeit, Stufe, Komponente und Korrelations-ID.'], ['Unit-Tests der Konfigurationsvalidierung', 'HTTP-Integrationstest der Health-Endpunkte', 'Shutdown-Smoke-Test']);

            add('A0', 'PostgreSQL-Anbindung und versionierte SQL-Migrationen implementieren', 'GAL-PLATFORM-DB-001', ['infrastructure', 'database'], ['GAL-PLATFORM-REPO-001', 'GAL-PLATFORM-RUNTIME-001'], {
              goal: 'PostgreSQL wird als persistente Grundlage mit reproduzierbaren, transaktionalen Migrationen eingebunden.',
              docs: ['docs/TESTING.md', 'docs/decisions/0005-a0-server-technologiestack.md'],
              items: ['Connection-Pool oder klar begrenzte Verbindungen über libpqxx', 'SQL-Migrationsverzeichnis und Tabelle `schema_migrations`', 'Serverkommando oder Hilfsbinary zum Anwenden und Prüfen von Migrationen', 'Docker-Compose für lokale PostgreSQL-Instanz', 'Transaktions- und Fehlergrenzen'],
              out: ['fachliche Tabellen nach A0-Accounts/Sessions', 'automatische Downgrade-Migrationen']
            }, ['Leere Datenbank wird deterministisch auf aktuellen Stand migriert.', 'Wiederholtes Anwenden ist ohne Nebenwirkung möglich.', 'Fehlerhafte Migration stoppt atomar und wird klar gemeldet.', 'Integrationstests nutzen isolierte Testdatenbank oder Testcontainer.'], ['Migrationstest von leerer Datenbank', 'Idempotenztest', 'Rollback bei absichtlich fehlerhafter Testmigration']);

            add('A0', 'REST-Kern, Routing und einheitliches Fehlerformat implementieren', 'GAL-API-CORE-001', ['api', 'infrastructure'], ['GAL-PLATFORM-RUNTIME-001'], {
              goal: 'Ein kleiner HTTP-Adapter setzt `/api/v1`, JSON-Verarbeitung, Request-Kontext und standardisierte Fehlerantworten um.',
              docs: ['docs/contracts/rest-api/galaxis-rest-v1.md', 'docs/issues/128'],
              items: ['Router und Handleradapter auf Boost.Asio/Beast', 'UTF-8 JSON und Content-Type-Prüfung', 'zentraler Request-Kontext', 'Fehlerobjekt mit stabilem Code, Nachricht, Korrelations-ID und optionalen Feldern', 'Grenzen für Bodygröße und Zeitüberschreitung'],
              out: ['Gameplay-Routen', 'WebSockets', 'Long Polling']
            }, ['Unbekannte Route, falsche Methode, ungültiges JSON und interne Fehler liefern definierte Antworten.', 'Interne Exceptions verlassen den Adapter nicht.', 'Domain- und Applicationfehler werden ohne Informationsleck übersetzt.', 'Handler sind isoliert testbar.'], ['Unit-Tests der Fehlerabbildung', 'HTTP-Integrationstests für 404, 405, 400, 415 und 500', 'Grenztest für maximale Requestgröße']);

            add('A0', 'Accounts und lokale Registrierung implementieren', 'GAL-AUTH-ACCOUNT-001', ['authentication', 'database', 'api'], ['GAL-PLATFORM-DB-001', 'GAL-API-CORE-001', 'galaxis-docs#128'], {
              goal: 'Lokale Accounts können sicher und idempotent registriert und dauerhaft gespeichert werden.',
              docs: ['docs/contracts/rest-api/galaxis-rest-v1.md', 'docs/decisions/0005-a0-server-technologiestack.md'],
              items: ['Account-Domainmodell und Repository-Schnittstelle', 'PostgreSQL-Tabellen und Migration', 'Normalisierung und Validierung der Anmeldekennung', 'Argon2id-Passworthash über libsodium', '`POST /api/v1/auth/accounts`', 'rate-limit-fähige Applicationgrenze ohne verteilte Rate-Limit-Infrastruktur'],
              out: ['E-Mail-Versand', 'Passwort-Reset', 'externe Identity-Provider']
            }, ['Passwörter werden niemals gespeichert oder geloggt.', 'Doppelte Kennungen führen zu kontrolliertem Konflikt ohne fremde Daten preiszugeben.', 'Hashparameter sind konfiguriert und aktualisierbar.', 'Account-ID ist stabil, undurchsichtig und vom DB-Schlüssel entkoppelt.'], ['Unit-Tests für Validierung und Normalisierung', 'Hash/Verify-Test', 'PostgreSQL-Integrationstest', 'HTTP-Contract-Test Registrierung']);

            add('A0', 'Bearer-Sessions, Anmeldung und Abmeldung implementieren', 'GAL-AUTH-SESSION-001', ['authentication', 'database', 'api'], ['GAL-AUTH-ACCOUNT-001', 'galaxis-docs#128'], {
              goal: 'Accounts können Sessions erstellen, prüfen und widerrufen; geschützte Routen erhalten eine bestätigte Accountidentität.',
              docs: ['docs/contracts/rest-api/galaxis-rest-v1.md'],
              items: ['opake zufällige Bearer-Tokens; nur gehashte Tokenwerte in PostgreSQL', 'Ablaufzeit, Widerruf und Last-Used-Zeit', '`POST /api/v1/auth/sessions`', '`GET /api/v1/auth/session`', '`DELETE /api/v1/auth/sessions/current`', 'Authentifizierungs-Middleware ohne Kampagnen- oder Reichsannahme'],
              out: ['Refresh-Token-System', 'OAuth', 'Rollen und Kampagnenberechtigungen']
            }, ['Ungültige und abgelaufene Tokens werden einheitlich abgelehnt.', 'Abmeldung widerruft nur die aktuelle Session.', 'Sessionantwort enthält keine Token- oder Passwortgeheimnisse.', 'Tokenvergleich und Lookup vermeiden Klartextspeicherung.'], ['Unit-Tests für Ablauf und Widerruf', 'PostgreSQL-Integrationstest', 'HTTP-Contract-Tests aller Sessionrouten', 'negativer Test gegen Informationslecks']);

            add('A0', 'Deterministische Zeit-, Zufalls- und ID-Provider bereitstellen', 'GAL-SIM-RUNTIME-001', ['simulation', 'infrastructure'], ['GAL-PLATFORM-REPO-001'], {
              goal: 'Simulation und spätere Kampagnenlogik erhalten injizierbare Provider für Zeit, Zufall und IDs statt direkter Systemzugriffe.',
              docs: ['docs/docs/01-gameplay/zeitmodell.md', 'docs/TESTING.md', 'docs/decisions/0003-mvp-simulations-und-schnittstellenmodell.md'],
              items: ['Interfaces für Wall Clock, Campaign Clock, Random Stream und ID-Generator', 'Produktions- und Fakeimplementierungen', 'Seed- und Streamtrennung', 'stabile Präfix-IDs für Ressourcen', 'keine globale Zufallsquelle'],
              out: ['Tick-Scheduler', 'Kampagnensimulation', 'fachliche Ereignisse']
            }, ['Tests können Zeit ohne Sleep vorwärtssetzen.', 'Gleicher Seed und gleiche Aufrufreihenfolge liefern dieselben Zufallswerte.', 'IDs bleiben undurchsichtig und kollisionssicher.', 'Domaincode verwendet keine direkte Systemzeit oder `random_device`.'], ['deterministische Unit-Tests', 'Parallel-/Streamtrennungstest', 'Fake-Clock-Test ohne reale Wartezeit']);

            add('A0', 'Versionierten Balancing-Loader, Schema und Hash implementieren', 'GAL-BAL-DATA-001', ['balancing', 'simulation'], ['GAL-PLATFORM-REPO-001', 'GAL-SIM-RUNTIME-001'], {
              goal: 'Der Server lädt eine versionierte A0-Balancingkonfiguration, validiert sie strikt und erzeugt einen kanonischen Hash.',
              docs: ['docs/balancing/data-format.md', 'docs/decisions/0004-versionierte-balancing-schicht.md', 'docs/balancing/README.md'],
              items: ['Manifest mit `balancingVersion`, `catalogVersion`, Einheiten und Quellen', 'Schema- und Referenzvalidierung', 'kanonische Serialisierung und Hash', 'immutable Runtime-Konfiguration', 'A0 enthält nur plattformnahe Zeit- und Sicherheitsgrenzen; Gameplaywerte folgen den Alphas'],
              out: ['vollständige B1-Kataloge', 'Hot Reload laufender Kampagnen']
            }, ['Ungültige Daten stoppen den Start mit Pfad und Ursache.', 'Version und Hash sind über internen Status abrufbar und logbar.', 'Laufzeitcode kann Werte nicht mutieren.', 'Gleicher Inhalt erzeugt plattformunabhängig denselben Hash.'], ['Validator-Fixtures positiv/negativ', 'Golden-Hash-Test', 'fehlende Quelle/Einheit/Referenz als Fehler']);

            add('A0', 'OpenAPI-Contract-Tests und API-Kompatibilitätsprüfung einrichten', 'GAL-API-CONTRACT-001', ['api', 'infrastructure'], ['GAL-API-CORE-001', 'GAL-AUTH-SESSION-001', 'galaxis-docs#128'], {
              goal: 'Die A0-Endpunkte werden automatisiert gegen die freigegebene OpenAPI-v1-Spezifikation geprüft.',
              docs: ['docs/contracts/rest-api/galaxis-rest-v1.md', 'docs/TESTING.md'],
              items: ['OpenAPI-Datei aus Docs als Testinput', 'Request-/Response-Schema-Prüfung', 'Beispielrequests als Integrationstests', 'Kompatibilitätscheck für additive Änderungen'],
              out: ['automatische Clientgenerierung', 'A1-A3-Verträge']
            }, ['Build schlägt bei Vertragsabweichung fehl.', 'Fehlerantworten werden ebenfalls geprüft.', 'Unbekannte additive Antwortfelder bleiben erlaubt.', 'Tests verwenden echten HTTP-Adapter und isolierte Datenbank.'], ['Contract-Test Registrierung/Login/Session/Logout', 'Schema-Negativtest', 'CI-Smoke-Test']);

            add('A0', 'Lokale Entwicklungsumgebung und CI-Qualitätsgate fertigstellen', 'GAL-QUALITY-CI-001', ['infrastructure'], ['GAL-PLATFORM-REPO-001', 'GAL-PLATFORM-DB-001', 'GAL-API-CONTRACT-001'], {
              goal: 'Ein frischer Checkout kann mit wenigen dokumentierten Befehlen gebaut, getestet und gegen PostgreSQL gestartet werden; dieselben Prüfungen laufen in CI.',
              docs: ['docs/TESTING.md', 'docs/WORKFLOW.md', 'docs/roadmap/CODEX-A0.md'],
              items: ['Docker Compose PostgreSQL und Beispielkonfiguration', 'CMake-Presets für Entwicklung und CI', 'Format/Lint, Build, Unit-, Integration- und Contract-Tests', 'Abbruch veralteter CI-Läufe und Caching', 'Smoke-Skript für die A0-Demo'],
              out: ['Produktionsdeployment', 'Lasttest', 'mehrere Betriebssystemmatrizen im PR']
            }, ['A0-Demo läuft nach frischem Clone gemäß README.', 'PR-Pipeline bleibt im Zielkorridor der Teststrategie.', 'Fehler liefern verwertbare Test- und Logartefakte.', 'Keine Secrets oder lokale Pfade sind eingecheckt.'], ['vollständiger A0-Smoke-Test', 'CI auf Linux; lokaler Windows-Preset dokumentiert', 'Migration plus Auth-Contract-Tests']);

            add('A1', 'Kampagnen erstellen und auflisten', 'GAL-CAMPAIGN-CREATE-001', ['api', 'database'], ['A0 abgeschlossen', 'galaxis-docs#129'], {
              goal: 'Ein authentifizierter Account kann eine neue Singleplayer-Kampagne mit Seed und Zeitprofil erstellen und seine Kampagnen auflisten.',
              docs: ['docs/docs/11-campaign/kampagnenstruktur.md', 'docs/contracts/rest-api/galaxis-rest-v1.md'],
              items: ['Campaign-Domainmodell und Status', 'Create/List/Get Applicationfälle', 'Persistenz und Teilnehmerzuordnung', 'idempotente Erstellung', 'stateVersion beginnt nachvollziehbar'],
              out: ['Pause/Resume-Feinregeln außerhalb der A1-Demo', 'Mehrspielerbeitritt']
            }, ['Kampagne gehört dem erstellenden Account.', 'Seed, Zeitprofil, Balancingversion und Hash werden gespeichert.', 'Wiederholte Create-Anfrage erzeugt keine Duplikate.', 'Nicht berechtigte Accounts sehen die Kampagne nicht.'], ['Domain-Unit-Tests', 'PostgreSQL-Integrationstest', 'REST-Contract-Test']);

            add('A1', 'Minimale deterministische Startgalaxie erzeugen', 'GAL-GALAXY-GENERATE-001', ['simulation', 'balancing'], ['GAL-CAMPAIGN-CREATE-001', 'GAL-SIM-RUNTIME-001'], {
              goal: 'Bei Kampagnenerstellung wird aus Seed und Profil eine kleine reproduzierbare Galaxie mit einem gültigen Heimatbereich erzeugt.',
              docs: ['docs/docs/02-galaxy/README.md', 'docs/decisions/0002-deterministische-graph-galaxie.md', 'docs/balancing/scenarios/s01-startreich.md'],
              items: ['Generator-Input und Outputmodell', 'Sternsysteme, Verbindungen und Himmelskörper', 'garantierter geeigneter Heimatplanet', 'A1 darf unbekannte Nachbarsysteme bereits intern erzeugen, aber noch nicht an Client offenlegen', 'Generatorbericht für Tests'],
              out: ['vollständige Galaxiegrößenkalibrierung', 'Erkundung und Wissenstransitionen']
            }, ['Gleicher Seed und gleiche Version ergeben identischen Hash.', 'Startposition erfüllt dokumentierte Invarianten.', 'Generator hängt nicht von Datenbank oder HTTP ab.', 'Fehlerhafte Konfiguration wird vor Persistenz abgelehnt.'], ['Golden-Seed-Test', 'Invarianten über mehrere feste Seeds', 'Persistenz-/Reload-Vergleich']);

            add('A1', 'Startreich und Controllerzuordnung anlegen', 'GAL-EMPIRE-START-001', ['simulation', 'database'], ['GAL-GALAXY-GENERATE-001'], {
              goal: 'Die neue Kampagne erhält ein Reich, dessen Controller eindeutig dem erstellenden Account zugeordnet ist.',
              docs: ['docs/docs/03-empires/reichsverwaltung.md', 'docs/docs/03-empires/controller-und-reichsuebernahme.md'],
              items: ['Empire-Identität und Persistenz', 'Account-Campaign-Empire-Zuordnung', 'Lese- und Befehlsberechtigung getrennt vorbereiten', 'reichsspezifischer Wissenscontainer'],
              out: ['AI-Übergabe', 'mehrere Reiche pro Account']
            }, ['Account steuert genau sein Startreich.', 'Controllerwechsel ist nicht implizit möglich.', 'Wissenscontainer wird leer und kontrolliert initialisiert.', 'Reload erhält Identität und Zuordnung.'], ['Berechtigungs-Unit-Tests', 'Persistenzintegration', 'negativer Zugriffstest']);

            add('A1', 'Heimatsystem, Heimatplanet und Startkolonie initialisieren', 'GAL-COLONY-HOME-001', ['simulation', 'database', 'balancing'], ['GAL-EMPIRE-START-001', 'GAL-GALAXY-GENERATE-001'], {
              goal: 'Das Startreich besitzt nach Erstellung ein bekanntes Heimatsystem, einen Heimatplaneten und eine aktive Kolonie.',
              docs: ['docs/docs/04-planets/planeten-und-kolonien.md', 'docs/balancing/domains/planets-and-colonies.md'],
              items: ['Besitz und Wissen initialisieren', 'Planet- und Colony-Entitäten', 'Startzustand und Spezialisierung neutral', 'atomare Erstellung mit Kampagne und Reich'],
              out: ['zweite Kolonie', 'Bauaufträge', 'Schiffe']
            }, ['Genau eine aktive Heimatkolonie existiert.', 'Besitz, Controller und Wissen sind konsistent.', 'Fehler erzeugen keine halbfertige Kampagne.', 'Startkolonie ist nach Reload identisch.'], ['Aggregate-Unit-Tests', 'Transaktionsintegration', 'Golden-Seed-Snapshot']);

            add('A1', 'Initiale Bevölkerung und Grundversorgung anlegen', 'GAL-POP-START-001', ['simulation', 'balancing', 'database'], ['GAL-COLONY-HOME-001'], {
              goal: 'Die Heimatkolonie erhält eine minimale Baseline aus Bevölkerung, Beschäftigungsreserve und essentieller Grundversorgung.',
              docs: ['docs/docs/05-population/bevoelkerung-und-arbeit.md', 'docs/docs/06-economy/wirtschaft-und-versorgung.md', 'docs/balancing/baseline.md'],
              items: ['Startbevölkerung und einfache Gruppenstruktur', 'noch keine aktive Wachstums- oder Produktionssimulation', 'Bestände für mindestens dokumentierte Startreserve', 'Erhaltungs- und Einheitenregeln'],
              out: ['Migration', 'Bedürfnisverbrauch', 'Produktionsketten']
            }, ['Startwerte stammen ausschließlich aus versionierten Balancingdaten.', 'Summen und Einheiten sind validiert.', 'Keine Tickverarbeitung wird vor A5/A6 erfunden.', 'API kann entscheidungsrelevante Zusammenfassung liefern.'], ['Datenvalidierung', 'Erhaltungstest beim Speichern/Laden', 'Snapshot der A1-Startlage']);

            add('A1', 'A1-Zustandsabfragen für Kampagne, Reich, System, Planet und Kolonie bereitstellen', 'GAL-API-A1-STATE-001', ['api'], ['GAL-COLONY-HOME-001', 'GAL-POP-START-001', 'galaxis-docs#129'], {
              goal: 'Der Client kann die vollständige A1-Demo über gefilterte REST-Ressourcen laden.',
              docs: ['docs/contracts/rest-api/galaxis-rest-v1.md'],
              items: ['Kampagnenstate', 'Reichsübersicht', 'bekannte Galaxie mit nur Heimatsystem', 'System- und Planetendetail', 'Kolonieübersicht', 'ETag/stateVersion-Grundlage'],
              out: ['Changes-Feed', 'Schiffe', 'unbekannte Systeme']
            }, ['Antworten enthalten keine unbekannten System- oder Objektinformationen.', 'Jede Ressource besitzt stabile Links und IDs.', 'Nicht berechtigter Zugriff liefert kein Informationsleck.', 'Client benötigt keine Datenbankkenntnis.'], ['Contract-Tests', 'Berechtigungs-Integrationstests', 'Snapshot-Tests gefilterter Antworten']);

            add('A1', 'Kampagnenzustand atomar speichern und laden', 'GAL-PERSIST-A1-001', ['database', 'simulation'], ['GAL-API-A1-STATE-001'], {
              goal: 'Alle A1-Aggregate überstehen Serverneustart und werden konsistent mit Balancingversion und stateVersion rekonstruiert.',
              docs: ['docs/TESTING.md', 'docs/decisions/0004-versionierte-balancing-schicht.md'],
              items: ['Repositorygrenzen für Campaign, Empire, Galaxy und Colony', 'Transaktionen und Optimistic Concurrency', 'Load-Validierung', 'Balancingversion und Hash im Kampagnenkopf'],
              out: ['Migration älterer Balancingversionen', 'Event Sourcing']
            }, ['Neustart verändert keinen sichtbaren Zustand.', 'Konkurrierende Writes werden erkannt.', 'Fehlerhafte oder inkompatible Daten werden kontrolliert abgelehnt.', 'stateVersion steigt nur bei erfolgreicher atomarer Änderung.'], ['Save/Load-Roundtrip', 'Concurrency-Test', 'Integrationstest nach Prozessneustart']);

            add('A1', 'Referenzszenario Heimatplanet und A1-Abnahmetest umsetzen', 'GAL-SCENARIO-A1-001', ['simulation', 'vertical-slice'], ['alle A1-Server-Issues'], {
              goal: 'Die A1-Demo wird als deterministische Fixture und HTTP-Integrationstest reproduzierbar.',
              docs: ['docs/balancing/scenarios/s01-startreich.md', 'docs/roadmap/IMPLEMENTATION-ROADMAP.md'],
              items: ['Account registrieren/anmelden', 'Kampagne erzeugen', 'Heimatplanet und Kolonie laden', 'Endzustand und Hash protokollieren', 'Reload wiederholen'],
              out: ['Client-E2E', 'Zeitfortschritt']
            }, ['Szenario läuft nach frischer Datenbank.', 'Gleicher Seed liefert gleichen fachlichen Hash.', 'Keine unbekannten Galaxiedaten in Antworten.', 'Fehler zeigt reproduzierbaren Seed und Schritt.'], ['Headless-/Integrationstest', 'Contract-Tests', 'Dokumentierter Demo-Befehl']);

            add('A2', 'Statischen MVP-Schiffskatalog definieren und laden', 'GAL-SHIP-CATALOG-001', ['balancing', 'simulation'], ['A1 abgeschlossen', 'galaxis-docs#130'], {
              goal: 'Ein kleiner versionierter Katalog enthält mindestens ein Erkundungsschiff mit stabiler ID und lokalen Bewegungswerten.',
              docs: ['docs/docs/08-fleets/flotten-und-raumkampf.md', 'docs/balancing/domains/fleets-travel-and-combat.md'],
              items: ['Schiffstyp, Rolle, Geschwindigkeit, Kapazität und Unterhalt', 'Schema- und Referenzvalidierung', 'kein frei konfigurierbarer Schiffsbau'],
              out: ['Kampfwerte', 'Schiffsdesigner', 'interstellare Reichweite']
            }, ['Katalog ist versioniert und Teil des Balancinghashs.', 'Unbekannte Schiffstypen verhindern Start/Load.', 'Erkundungsschiff besitzt nur A2-relevante Werte.'], ['Validator-Tests', 'Golden-Hash-Erweiterung']);

            add('A2', 'Schiffs- und Flottenaggregate implementieren', 'GAL-FLEET-ENTITY-001', ['simulation', 'database'], ['GAL-SHIP-CATALOG-001'], {
              goal: 'Schiffe besitzen Identität, Typ und Standort; Flotten bündeln Schiffe und besitzen einen eindeutigen Bewegungszustand.',
              docs: ['docs/docs/08-fleets/flotten-und-raumkampf.md'],
              items: ['Ship und Fleet Domainmodelle', 'Flottenmitgliedschaft und Standortinvarianten', 'Persistenz', 'noch kein Kampf oder Versorgung'],
              out: ['Aufteilung/Zusammenlegung', 'Schäden', 'Reparatur']
