            const existing = await github.paginate(github.rest.issues.listForRepo, { owner, repo, state: 'all', per_page: 100 });
            const result = [];
            for (const spec of specs) {
              let issue = existing.find(item => !item.pull_request && item.title === spec.title);
              if (!issue) issue = (await github.rest.issues.create({ owner, repo, title: spec.title, body: spec.body, labels: spec.labels, milestone: spec.milestone })).data;
              else issue = (await github.rest.issues.update({ owner, repo, issue_number: issue.number, title: spec.title, body: spec.body, labels: spec.labels, milestone: spec.milestone, state: 'open' })).data;
              result.push({ number: issue.number, title: issue.title, milestone: issue.milestone?.number });
            }
            const path = '.github/alpha-server-issues.json';
            let sha;
            try { sha = (await github.rest.repos.getContent({ owner, repo, path, ref: 'main' })).data.sha; } catch (error) { if (error.status !== 404) throw error; }
            await github.rest.repos.createOrUpdateFileContents({ owner, repo, path, branch: 'main', sha, message: 'chore: record alpha server issues', content: Buffer.from(JSON.stringify(result, null, 2) + '\n').toString('base64') });
