name: Run alpha server bootstrap

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/run-alpha-server-bootstrap.yml

permissions:
  contents: write
  issues: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const response = await github.rest.repos.getContent({ owner, repo, path: '.github/workflows/bootstrap-alpha-server-issues.yml', ref: 'main' });
            const yaml = Buffer.from(response.data.content, 'base64').toString('utf8');
            const marker = '          script: |\n';
            const start = yaml.indexOf(marker);
            if (start < 0) throw new Error('script block not found');
            const source = yaml.slice(start + marker.length).split('\n').map(line => line.startsWith('            ') ? line.slice(12) : line).join('\n');
            await eval(`(async () => { ${source} })()`);
