services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: galaxis
      POSTGRES_USER: galaxis
      POSTGRES_PASSWORD: galaxis
    ports:
      - "5432:5432"
    volumes:
      - galaxis-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U galaxis -d galaxis"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  galaxis-postgres-data:
